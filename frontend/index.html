<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCare Tech CR | Soporte y Seguridad</title>
    <style>
        :root { --brand: #1b4332; --brand-hover: #2d6a4f; --text: #2D3748; --muted: #718096; --bg: #F8F9FA; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); }
        .container { max-width: 1140px; margin: 0 auto; padding: 0 20px; }
        
        header { background: white; padding: 20px 0; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .navbar { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 24px; color: var(--brand); }

        .section { padding: 80px 0; }
        .center-text { text-align: center; margin-bottom: 50px; }
        .center-text h2 { font-size: 36px; margin-bottom: 15px; }

        /* SERVICIOS - Estilo imagen solicitada */
        .srv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; }
        .srv-card { 
            background: white; padding: 40px 30px; border-radius: 20px; text-align: center; 
            box-shadow: var(--shadow); transition: 0.4s ease; border: 1px solid transparent;
        }
        .srv-card:hover { transform: translateY(-10px); border-color: var(--brand); }
        .srv-icon { font-size: 50px; margin-bottom: 20px; display: block; }
        .srv-card h3 { font-size: 20px; margin-bottom: 15px; font-weight: 700; }
        .srv-card p { color: var(--muted); font-size: 15px; margin-bottom: 25px; line-height: 1.6; }
        
        .btn { padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: 600; display: inline-block; transition: 0.3s; }
        .btn-brand { background: var(--brand); color: white; }
        .btn-outline { border: 2px solid var(--brand); color: var(--brand); width: 100%; }
        .btn-outline:hover { background: var(--brand); color: white; }

        /* MISIÓN / VISIÓN */
        .about { background: white; padding: 80px 0; }
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .about-box { padding: 40px; background: var(--bg); border-radius: 20px; border-left: 6px solid var(--brand); }

        /* WHATSAPP */
        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: grid; place-items: center; font-size: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); z-index: 1000; }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <div class="logo">iCare Tech CR</div>
            <a href="#" class="btn btn-brand" onclick="openWA('Hola, necesito soporte.')">Contacto</a>
        </div>
    </header>

    <section class="section container">
        <div class="center-text">
            <h2>Catálogo de Servicios</h2>
            <p style="color: var(--muted)">Excelencia técnica en cada solución.</p>
        </div>
        <div class="srv-grid" id="serv-container">
            </div>
    </section>

    <section class="about">
        <div class="container about-grid">
            <div class="about-box">
                <h3 style="color: var(--brand); margin-bottom: 15px;">🎯 Nuestra Misión</h3>
                <p id="txt-mision" style="color: var(--muted); line-height: 1.7;"></p>
            </div>
            <div class="about-box">
                <h3 style="color: var(--brand); margin-bottom: 15px;">🚀 Nuestra Visión</h3>
                <p id="txt-vision" style="color: var(--muted); line-height: 1.7;"></p>
            </div>
        </div>
    </section>

    <a href="#" class="wa-float" onclick="openWA('Hola iCare Tech')">💬</a>

    <script>
        const API = 'http://127.0.0.1:5001/api';
        function openWA(m) { window.open(`https://wa.me/50685836365?text=${encodeURIComponent(m)}`); }

        document.addEventListener("DOMContentLoaded", () => {
            // Cargar Servicios
            fetch(`${API}/servicios`).then(r=>r.json()).then(data => {
                const c = document.getElementById('serv-container');
                data.forEach(s => {
                    c.innerHTML += `
                    <div class="srv-card">
                        <span class="srv-icon">${s.icono}</span>
                        <h3>${s.titulo}</h3>
                        <p>${s.descripcion}</p>
                        <a href="#" class="btn btn-outline" onclick="openWA('Me interesa el servicio: ${s.titulo}')">Cotizar Servicio</a>
                    </div>`;
                });
            });

            // Cargar Misión/Visión
            fetch(`${API}/config`).then(r=>r.json()).then(d => {
                document.getElementById('txt-mision').innerText = d.mision;
                document.getElementById('txt-vision').innerText = d.vision;
            });
        });
    </script>
</body>
</html>
