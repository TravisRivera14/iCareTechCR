<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - iCare Tech CR</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        h2 { color: #1b4332; margin-top: 0; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        textarea { height: 80px; resize: none; }
        button { background: #1b4332; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:hover { background: #2d6a4f; }
        .nav-admin { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛠 Editar Textos de la Web</h2>
        <form id="formConfig">
            <label>Misión:</label>
            <textarea id="mision_txt" placeholder="Escribe aquí la misión..."></textarea>
            <label>Visión:</label>
            <textarea id="vision_txt" placeholder="Escribe aquí la visión..."></textarea>
            <button type="submit">Actualizar Misión y Visión</button>
        </form>
    </div>

    <div class="card">
        <h2>📦 Agregar Nuevo Producto</h2>
        <form id="formProd">
            <input type="text" id="nombre" placeholder="Nombre del producto" required>
            <select id="categoria">
                <option value="iPhone">iPhone</option>
                <option value="Mac">Mac & iPad</option>
                <option value="Accesorios">Accesorios</option>
                <option value="Camaras">Cámaras de Vigilancia</option>
            </select>
            <input type="text" id="precio" placeholder="Precio o descripción" required>
            <input type="text" id="imagen" placeholder="Ruta de imagen (assets/img/...)" required>
            <button type="submit">Guardar Producto</button>
        </form>
    </div>

    <script>
        // Cargar textos actuales al abrir
        fetch('http://127.0.0.1:5001/api/config')
            .then(res => res.json())
            .then(data => {
                document.getElementById('mision_txt').value = data.mision;
                document.getElementById('vision_txt').value = data.vision;
            });

        // Guardar Textos
        document.getElementById('formConfig').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                mision: document.getElementById('mision_txt').value,
                vision: document.getElementById('vision_txt').value
            };
            fetch('http://127.0.0.1:5001/api/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(res => res.json()).then(d => alert(d.mensaje));
        });

        // Guardar Producto
        document.getElementById('formProd').addEventListener('submit', (e) => {
            e.preventDefault();
            const prod = {
                nombre: document.getElementById('nombre').value,
                categoria: document.getElementById('categoria').value,
                precio: document.getElementById('precio').value,
                imagen: document.getElementById('imagen').value
            };
            fetch('http://127.0.0.1:5001/api/productos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(prod)
            }).then(res => res.json()).then(d => { alert(d.mensaje); document.getElementById('formProd').reset(); });
        });
    </script>
</body>
</html>
