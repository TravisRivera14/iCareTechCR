<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iCare Admin | Control Panel</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f5f5f7; padding: 40px; color: #1d1d1f; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #d2d2d7; }
        h1 { font-weight: 700; margin-bottom: 30px; }
        h2 { font-size: 19px; margin-bottom: 15px; color: #1b4332; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #d2d2d7; font-size: 15px; box-sizing: border-box; }
        button { background: #1b4332; color: white; border: none; cursor: pointer; font-weight: 600; }
        .srv-box { background: #fbfbfd; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e5e5e5; }
    </style>
</head>
<body>
<div class="container">
    <h1>Panel Administrativo</h1>

    <div class="card">
        <h2>🛠 Gestión de Servicios</h2>
        <div id="srv-list"></div>
        <button onclick="saveSrv()">Guardar Cambios en Servicios</button>
    </div>

    <div class="card">
        <h2>🎯 Misión y Visión</h2>
        <textarea id="mision" placeholder="Misión"></textarea>
        <textarea id="vision" placeholder="Visión"></textarea>
        <button onclick="saveConfig()">Actualizar Textos</button>
    </div>

    <div class="card">
        <h2>📦 Nuevo Producto</h2>
        <input type="text" id="pName" placeholder="Nombre Producto">
        <select id="pCat">
            <option value="iPhone">iPhone</option>
            <option value="Mac">Mac & iPad</option>
            <option value="Accesorios">Accesorios</option>
            <option value="Camaras">Cámaras</option>
        </select>
        <input type="text" id="pPrice" placeholder="Precio o Descripción">
        <input type="text" id="pImg" placeholder="Ruta Imagen (assets/img/...)">
        <button onclick="saveProd()">Añadir al Catálogo</button>
    </div>
</div>

<script>
    const API = 'http://127.0.0.1:5001/api';
    
    window.onload = () => {
        fetch(`${API}/config`).then(r=>r.json()).then(d=>{ 
            document.getElementById('mision').value = d.mision; 
            document.getElementById('vision').value = d.vision; 
        });
        fetch(`${API}/servicios`).then(r=>r.json()).then(data => {
            const list = document.getElementById('srv-list');
            data.forEach(s => {
                list.innerHTML += `<div class="srv-box"><div style="display:flex; gap:10px;"><input type="text" class="si" value="${s.icono}" style="width:20%"><input type="text" class="st" value="${s.titulo}" style="width:80%"></div><textarea class="sd">${s.descripcion}</textarea></div>`;
            });
        });
    };

    function saveSrv() {
        const icons = document.querySelectorAll('.si'), titles = document.querySelectorAll('.st'), descs = document.querySelectorAll('.sd');
        let data = [];
        for(let i=0; i<icons.length; i++) data.push({ icono: icons[i].value, titulo: titles[i].value, descripcion: descs[i].value });
        fetch(`${API}/servicios`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) }).then(r=>r.json()).then(d=>alert(d.mensaje));
    }

    function saveConfig() {
        const d = { mision: document.getElementById('mision').value, vision: document.getElementById('vision').value };
        fetch(`${API}/config`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) }).then(r=>r.json()).then(d=>alert(d.mensaje));
    }

    function saveProd() {
        const p = { nombre: document.getElementById('pName').value, categoria: document.getElementById('pCat').value, precio: document.getElementById('pPrice').value, imagen: document.getElementById('pImg').value };
        fetch(`${API}/productos`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p) }).then(r=>r.json()).then(d=>{ alert(d.mensaje); location.reload(); });
    }
</script>
</body>
</html>
